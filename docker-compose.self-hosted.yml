services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.self-hosted
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.self-hosted
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-lc", "npm run db:migrate && npm run start"]
    ports:
      - "3001:3001"
    volumes:
      - app_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.self-hosted
    depends_on:
      app:
        condition: service_healthy
    command: ["npm", "run", "start:worker"]
    volumes:
      - app_data:/app/data

volumes:
  postgres_data:
  app_data:
